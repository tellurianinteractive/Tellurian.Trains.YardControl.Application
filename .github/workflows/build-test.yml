name: Build and Test

on:
  push:
    branches: [master]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore "Yard Control Application.slnx"

      - name: Build
        run: dotnet build "Yard Control Application.slnx" --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
