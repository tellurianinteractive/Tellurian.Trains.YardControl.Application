name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: win-x64
            archive: zip
          - rid: win-arm64
            archive: zip
          - rid: linux-x64
            archive: tar.gz
          - rid: linux-arm
            archive: tar.gz
          - rid: linux-arm64
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore "Yard Control Application.slnx"

      - name: Build
        run: dotnet build "Yard Control Application.slnx" --no-restore -c Release

      - name: Test
        run: dotnet test "Yard Control Application.slnx" --no-build -c Release --verbosity normal

      - name: Publish
        run: dotnet publish YardController.Web/YardController.Web.csproj -c Release --self-contained -r ${{ matrix.rid }} -o ./publish/${{ matrix.rid }}

      - name: Create zip archive
        if: matrix.archive == 'zip'
        run: cd publish/${{ matrix.rid }} && zip -r ../../YardControlApplication-${{ github.ref_name }}-${{ matrix.rid }}.zip .

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        run: tar -czf YardControlApplication-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz -C publish/${{ matrix.rid }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YardControlApplication-${{ matrix.rid }}
          path: YardControlApplication-${{ github.ref_name }}-${{ matrix.rid }}.*

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASENOTES.md
          files: artifacts/*
          generate_release_notes: false
